<div>
  <h1 class="section-title">Users ({{ totalCount() }})</h1>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Joined</th><th>Actions</th></tr>
      </thead>
      <tbody>
        @for (u of users(); track u.id) {
          <tr>
            <td><strong>{{ u.fullName || '-' }}</strong></td>
            <td>{{ u.email }}</td>
            <td><span class="badge {{ u.role === 'Admin' ? 'badge-primary' : 'badge-secondary' }}">{{ u.role }}</span></td>
            <td>{{ u.phone ?? '-' }}</td>
            <td>{{ u.createdUtc | date:'mediumDate' }}</td>
            <td>
              <button class="btn btn-outline btn-sm" (click)="openRoleModal(u)">✏️ Role</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  <app-pagination [page]="page()" [totalPages]="totalPages()" (pageChange)="onPage($event)"></app-pagination>
</div>

@if (showRoleModal()) {
  <div class="modal-overlay" (click)="showRoleModal.set(false)">
    <div class="modal" style="max-width:360px" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <span>Change Role</span>
        <button class="btn-icon" (click)="showRoleModal.set(false)">✕</button>
      </div>
      <div class="modal-body">
        <p class="text-muted" style="margin-bottom:1rem">{{ roleTarget()?.email }}</p>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-control" [value]="newRole()" (change)="newRole.set($any($event.target).value)">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div class="modal-footer" style="padding:0;margin-top:1rem">
          <button class="btn btn-secondary" (click)="showRoleModal.set(false)">Cancel</button>
          <button class="btn btn-primary" (click)="updateRole()">Update Role</button>
        </div>
      </div>
    </div>
  </div>
}
