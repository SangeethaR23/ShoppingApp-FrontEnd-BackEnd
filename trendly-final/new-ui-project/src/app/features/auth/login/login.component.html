<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left__logo">Trendly</div>
    <p class="auth-left__tagline">India's Fashion<br/>Destination</p>
    <p class="auth-left__sub">Discover millions of products from top brands.</p>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h2 class="auth-title">Welcome back!</h2>
      <p class="auth-sub">Sign in to continue to Trendly</p>
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-control" type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" [(ngModel)]="password" name="password" required placeholder="Enter your password" />
        </div>
        @if (errorMsg()) {
          <p class="form-error error-msg">{{ errorMsg() }}</p>
        }
        <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loading()">
          @if (loading()) { SIGNING IN... } @else { LOGIN }
        </button>
      </form>
      <p class="auth-footer">
        New to Trendly? <a routerLink="/register">Create Account</a>
      </p>
    </div>
  </div>
</div>
